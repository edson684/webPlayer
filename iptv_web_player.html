<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Web Player</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f0f0f;color:#e0e0e0}
.app{display:grid;grid-template-rows:48px 1fr;height:100vh;min-height:600px}
.topbar{background:#1a1a1a;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;gap:12px;padding:0 16px}
.topbar h1{font-size:15px;font-weight:500;color:#fff}
.tabs{display:flex;gap:4px;margin-left:auto}
.tab{padding:6px 14px;font-size:13px;border:1px solid #333;border-radius:6px;cursor:pointer;background:transparent;color:#999}
.tab.active{background:#2a2a2a;color:#fff;font-weight:500}
.main{display:grid;grid-template-columns:280px 1fr;overflow:hidden}
.sidebar{background:#141414;border-right:1px solid #2a2a2a;display:flex;flex-direction:column;overflow:hidden}
.sidebar-top{padding:12px;border-bottom:1px solid #2a2a2a}
.sidebar-top input{width:100%;padding:7px 10px;font-size:13px;border:1px solid #333;border-radius:6px;background:#1e1e1e;color:#e0e0e0}
.sidebar-top input::placeholder{color:#555}
.channel-list{flex:1;overflow-y:auto}
.channel-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid #1e1e1e}
.channel-item:hover{background:#1e1e1e}
.channel-item.active{background:#1a2a3a}
.ch-logo{width:36px;height:36px;border-radius:6px;background:#2a2a2a;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#888;overflow:hidden;flex-shrink:0}
.ch-logo img{width:100%;height:100%;object-fit:cover;border-radius:6px}
.ch-info{flex:1;min-width:0}
.ch-name{font-size:13px;font-weight:500;color:#e0e0e0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-group{font-size:11px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-area{display:flex;flex-direction:column;background:#000;overflow:hidden}
.video-wrap{flex:1;position:relative;background:#000;display:flex;align-items:center;justify-content:center}
video{width:100%;height:100%;object-fit:contain}
.placeholder{display:flex;flex-direction:column;align-items:center;gap:12px;color:#444}
.placeholder i{font-size:48px}
.placeholder p{font-size:14px}
.info-bar{background:#1a1a1a;border-top:1px solid #2a2a2a;padding:10px 16px;display:flex;align-items:center;gap:12px}
.ch-now{font-size:13px;font-weight:500;color:#e0e0e0}
.ch-url{font-size:11px;color:#555;margin-left:auto;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.panel{padding:16px;overflow-y:auto;background:#141414;display:none;flex-direction:column;gap:12px}
.panel.show{display:flex}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:12px;color:#888;font-weight:500}
.form-group input{padding:8px 10px;font-size:13px;border:1px solid #333;border-radius:6px;background:#1e1e1e;color:#e0e0e0}
.form-group input::placeholder{color:#555}
.btn-primary{padding:9px 16px;font-size:13px;font-weight:500;border:none;border-radius:6px;background:#185FA5;color:#fff;cursor:pointer}
.btn-primary:hover{background:#0c447c}
.sep{font-size:12px;color:#555;text-align:center;padding:4px 0}
.status{font-size:12px;padding:8px 10px;border-radius:6px;background:#1e1e1e;color:#888}
.status.ok{background:#0d2e1a;color:#4caf50}
.status.err{background:#2e0d0d;color:#f44336}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;color:#555;font-size:13px;padding:24px;text-align:center}
.empty i{font-size:32px}
.tag{font-size:10px;padding:2px 7px;border-radius:10px;background:#2a2a2a;color:#888;font-weight:500}
.tag.live{background:#2e0d0d;color:#f44336}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <i class="ti ti-player-play" style="font-size:20px;color:#185FA5"></i>
    <h1>IPTV Web Player</h1>
    <div class="tabs">
      <button class="tab active" onclick="showTab('player')">Player</button>
      <button class="tab" onclick="showTab('m3u')">M3U</button>
      <button class="tab" onclick="showTab('xtream')">Xtream Codes</button>
    </div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="sidebar-top">
        <input type="text" id="searchInput" placeholder="Buscar canal..." oninput="filterChannels()">
      </div>
      <div class="channel-list" id="channelList">
        <div class="empty">
          <i class="ti ti-list"></i>
          <span>Nenhum canal carregado</span>
          <span style="font-size:11px;color:#444">Use as abas M3U ou Xtream para adicionar</span>
        </div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;flex:1;overflow:hidden">
      <div id="tab-player" class="player-area" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
        <div class="video-wrap">
          <div class="placeholder" id="placeholder">
            <i class="ti ti-player-play"></i>
            <p>Selecione um canal na lista</p>
          </div>
          <video id="videoEl" controls style="display:none"></video>
        </div>
        <div class="info-bar">
          <span class="tag live" id="liveTag" style="display:none">AO VIVO</span>
          <span class="ch-now" id="nowPlaying">Nada reproduzindo</span>
          <span class="ch-url" id="nowUrl"></span>
        </div>
      </div>

      <div id="tab-m3u" class="panel" style="max-width:480px;margin:0 auto;width:100%">
        <div style="font-size:14px;font-weight:500;color:#fff">Carregar playlist M3U</div>
        <div class="form-group">
          <label>URL da playlist (.m3u / .m3u8)</label>
          <input type="text" id="m3uUrl" placeholder="http://servidor.com/playlist.m3u">
        </div>
        <button class="btn-primary" onclick="loadM3UFromUrl()">Carregar URL</button>
        <div class="sep">— ou —</div>
        <div class="form-group">
          <label>Arquivo local</label>
          <input type="file" id="m3uFile" accept=".m3u,.m3u8" onchange="loadM3UFromFile()">
        </div>
        <div id="m3uStatus" class="status" style="display:none"></div>
      </div>

      <div id="tab-xtream" class="panel" style="max-width:480px;margin:0 auto;width:100%">
        <div style="font-size:14px;font-weight:500;color:#fff">Xtream Codes API</div>
        <div class="form-group">
          <label>Servidor</label>
          <input type="text" id="xtHost" placeholder="http://servidor.com:8080">
        </div>
        <div class="form-group">
          <label>Usuário</label>
          <input type="text" id="xtUser" placeholder="usuario">
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="xtPass" placeholder="senha">
        </div>
        <button class="btn-primary" onclick="loadXtream()">Conectar</button>
        <div id="xtStatus" class="status" style="display:none"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
<script>
var PROXY = 'https://iptv-proxy-production-7400.up.railway.app/proxy?url=';

var channels = [];
var filtered = [];
var activeHls = null;

function proxify(url) {
  return PROXY + encodeURIComponent(url);
}

function showTab(name) {
  document.getElementById('tab-player').style.display = name === 'player' ? 'flex' : 'none';
  document.getElementById('tab-m3u').classList.toggle('show', name === 'm3u');
  document.getElementById('tab-xtream').classList.toggle('show', name === 'xtream');
  document.querySelectorAll('.tab').forEach(function(b, i) {
    b.classList.toggle('active', ['player','m3u','xtream'][i] === name);
  });
}

function parseM3U(text) {
  var lines = text.split('\n');
  var result = [];
  var current = null;
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (line.startsWith('#EXTINF')) {
      current = {name:'Canal', group:'', logo:'', url:''};
      var nameMatch = line.match(/,(.+)$/);
      if (nameMatch) current.name = nameMatch[1].trim();
      var groupMatch = line.match(/group-title="([^"]*)"/);
      if (groupMatch) current.group = groupMatch[1];
      var logoMatch = line.match(/tvg-logo="([^"]*)"/);
      if (logoMatch) current.logo = logoMatch[1];
    } else if (line && !line.startsWith('#') && current) {
      current.url = line;
      result.push(current);
      current = null;
    }
  }
  return result;
}

function loadM3UFromUrl() {
  var url = document.getElementById('m3uUrl').value.trim();
  if (!url) return;
  setStatus('m3uStatus', 'Carregando...', '');
  fetch(proxify(url))
    .then(function(r) { return r.text(); })
    .then(function(txt) {
      var ch = parseM3U(txt);
      if (!ch.length) { setStatus('m3uStatus', 'Nenhum canal encontrado.', 'err'); return; }
      channels = ch; filtered = ch;
      renderChannels();
      setStatus('m3uStatus', ch.length + ' canais carregados com sucesso.', 'ok');
      showTab('player');
    })
    .catch(function(e) { setStatus('m3uStatus', 'Erro: ' + e.message, 'err'); });
}

function loadM3UFromFile() {
  var file = document.getElementById('m3uFile').files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var ch = parseM3U(e.target.result);
    if (!ch.length) { setStatus('m3uStatus', 'Nenhum canal encontrado.', 'err'); return; }
    channels = ch; filtered = ch;
    renderChannels();
    setStatus('m3uStatus', ch.length + ' canais carregados.', 'ok');
    showTab('player');
  };
  reader.readAsText(file);
}

function loadXtream() {
  var host = document.getElementById('xtHost').value.trim().replace(/\/$/, '');
  var user = document.getElementById('xtUser').value.trim();
  var pass = document.getElementById('xtPass').value.trim();
  if (!host || !user || !pass) { setStatus('xtStatus', 'Preencha todos os campos.', 'err'); return; }
  var apiUrl = host + '/player_api.php?username=' + encodeURIComponent(user) + '&password=' + encodeURIComponent(pass) + '&action=get_live_streams';
  setStatus('xtStatus', 'Conectando (tentativa direta)...', '');

  // Tenta primeiro sem proxy, depois com proxy
  fetchJson(apiUrl)
    .catch(function() {
      setStatus('xtStatus', 'Tentando via proxy...', '');
      return fetchJson(proxify(apiUrl));
    })
    .then(function(data) {
      if (!Array.isArray(data) || !data.length) {
        setStatus('xtStatus', 'Sem canais retornados. Verifique usuário, senha e se o servidor está online.', 'err');
        return;
      }
      channels = data.map(function(s) {
        return {
          name: s.name || 'Canal',
          group: s.category_name || '',
          logo: s.stream_icon || '',
          url: host + '/live/' + user + '/' + pass + '/' + s.stream_id + '.m3u8'
        };
      });
      filtered = channels;
      renderChannels();
      setStatus('xtStatus', channels.length + ' canais carregados.', 'ok');
      showTab('player');
    })
    .catch(function(e) {
      setStatus('xtStatus', 'Falha na conexão. Verifique: 1) host correto com porta (ex: http://srv.com:8080) 2) usuário e senha 3) servidor online', 'err');
    });
}

function fetchJson(url) {
  return fetch(url)
    .then(function(r) {
      var ct = r.headers.get('content-type') || '';
      if (!ct.includes('json')) {
        return r.text().then(function(txt) {
          throw new Error('Servidor retornou HTML em vez de JSON. Resposta: ' + txt.slice(0, 80));
        });
      }
      return r.json();
    });
}

function renderChannels() {
  var list = document.getElementById('channelList');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty"><i class="ti ti-search"></i><span>Nenhum resultado</span></div>';
    return;
  }
  list.innerHTML = filtered.map(function(ch, i) {
    var initials = ch.name.replace(/[^a-zA-Z0-9]/g, '').slice(0, 2).toUpperCase() || 'CH';
    var logo = ch.logo ? '<img src="' + ch.logo + '" onerror="this.style.display=\'none\'">' : initials;
    return '<div class="channel-item" id="chi-' + i + '" onclick="playChannel(' + i + ')">'
      + '<div class="ch-logo">' + logo + '</div>'
      + '<div class="ch-info"><div class="ch-name">' + escHtml(ch.name) + '</div>'
      + '<div class="ch-group">' + escHtml(ch.group || 'Sem categoria') + '</div></div>'
      + '</div>';
  }).join('');
}

function filterChannels() {
  var q = document.getElementById('searchInput').value.toLowerCase();
  filtered = channels.filter(function(c) {
    return c.name.toLowerCase().includes(q) || (c.group || '').toLowerCase().includes(q);
  });
  renderChannels();
}

function playChannel(idx) {
  var ch = filtered[idx];
  if (!ch) return;
  document.querySelectorAll('.channel-item').forEach(function(el) { el.classList.remove('active'); });
  var item = document.getElementById('chi-' + idx);
  if (item) item.classList.add('active');
  var video = document.getElementById('videoEl');
  document.getElementById('placeholder').style.display = 'none';
  video.style.display = 'block';
  document.getElementById('nowPlaying').textContent = ch.name;
  document.getElementById('nowUrl').textContent = ch.url;
  document.getElementById('liveTag').style.display = 'inline';
  if (activeHls) { activeHls.destroy(); activeHls = null; }
  var streamUrl = proxify(ch.url);
  if (Hls.isSupported()) {
    var hls = new Hls({enableWorker: true, lowLatencyMode: true});
    hls.loadSource(streamUrl);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, function() { video.play().catch(function() {}); });
    hls.on(Hls.Events.ERROR, function(e, data) {
      if (data.fatal) { video.src = streamUrl; video.play().catch(function() {}); }
    });
    activeHls = hls;
  } else {
    video.src = streamUrl;
    video.play().catch(function() {});
  }
}

function setStatus(id, msg, type) {
  var el = document.getElementById(id);
  el.style.display = 'block';
  el.textContent = msg;
  el.className = 'status' + (type ? ' ' + type : '');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

showTab('player');
</script>
</body>
</html>
